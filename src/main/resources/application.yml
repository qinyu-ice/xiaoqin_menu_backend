server:
  port: 8101

jwt:
  # jwtSecret: 用于签名JWT的密钥 要求：至少256位(32个字符)的复杂随机字符串。
  secret: 9Z8k7X6j5B4n3M2b1V0c9L8K7J6H5G4F3D2S1A0z9x8c7v6b5n4m3l2k1j0h9g8f7d6s5a4
  # jwtExpirationMs: JWT令牌的有效期，单位为毫秒。
  expiration: 7200000 # 例如，2小时

spring:
  data:
    redis:
      database: 8
      host: localhost
      port: 6379
      password: 321520

  datasource:
    url: jdbc:mysql://localhost:3306/xiaoqin_menu?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    password: 321520
    username: root
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      max-lifetime: 1800000
      minimum-idle: 1
      maximum-pool-size: 10
      connection-test-query: select 1
      auto-commit: true
      idle-timeout: 60000

  application:
    name: springai
  config:
    import:
      - optional:file:.env.local[.properties]     # 以 .properties 文件的格式读取 .env.local，模拟环境变量读取

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        model: deepseek-chat  # 指定模型，如 deepseek-chat
        temperature: 0.7      # 控制回复的随机性，范围0-2[reference:9]
        max-tokens: 2000      # 控制回复的最大长度[reference:10][reference:11]

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always   # 自动建表

# 阿里云 OSS 配置
aliyun:
  oss:
    # 阿里云账号AccessKey ID
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}  # 改用环境变量
    # 阿里云账号AccessKey Secret
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    # OSS Endpoint
    # 参考地址：https://help.aliyun.com/document_detail/31837.html
    endpoint: oss-cn-chengdu.aliyuncs.com
    # 默认存储桶名称
    bucket-name: xiaoqin-menu
    # 可选：是否使用HTTPS（推荐true）
    secure: true
    # 可选：文件上传大小限制
    max-file-size: 10MB
    # 可选：文件上传总大小限制
    max-request-size: 100MB
    # 可选：文件访问前缀（CDN域名或OSS域名，用于拼接文件访问路径）
    domain: https://your-bucket-name.oss-cn-chengdu.aliyuncs.com
